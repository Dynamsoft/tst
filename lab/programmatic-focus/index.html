<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamsoft Barcode Scanner Sample - Programmatic Focus</title>
  <!-- Include Dynamsoft Barcode Reader Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.4.2001/dist/dbr.bundle.js"></script>
  <!-- If the network is unstable or you prefer to self-host the SDK, uncomment the line below to load it locally -->
  <!-- <script src="../../../dist/dbr.bundle.js"></script> -->

  <!--
    Please note that putting CSS at the end is not a best practice.
    We do this so that you can focus on reading the JS logic.
  -->
  <style>
    /* Reset default margin and padding, and apply border-box sizing */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Ensure html and body take full viewport size */
    html,
    body {
      width: 100%;
      height: 100%;
    }

    /* Style for the scanner title */
    .barcode-scanner-title {
      height: 60px;
      line-height: 60px;
      text-align: center;
      font-size: 20px;
    }

    .focus-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 8px;
      flex-wrap: wrap;
    }

    .focus-controls button {
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .focus-controls button.active {
      background: #007bff;
      color: #fff;
      border: 1px solid #007bff;
    }

    /* Container where the barcode scanner will be rendered */
    .barcode-scanner-view {
      width: 100%;
      height: calc(100% - 230px);
    }

    .result-view {
      width: 100%;
      height: 100px;
      padding: 10px;
      overflow: auto;
    }

  </style>
</head>

<body>
  <h1 class="barcode-scanner-title">Programmatic Focus</h1>
  <div class="focus-controls">
    <span id="focus-status" style="font-size:13px;color:#999;">Checking focusDistance support...</span>
    <button id="btn-center" onclick="triggerFocusCenter()" disabled>Focus Center</button>
    <button id="btn-singleframe" onclick="toggleSingleFrameMode()">Single-Frame Mode</button>
    <button id="btn-capabilities" onclick="downloadCapabilities()">Download Camera Capabilities</button>
  </div>
  <!-- This div will host the barcode scanner's camera view -->
  <div class="barcode-scanner-view"></div>
  <div class="result-view"></div>

  <script>
    /** LICENSE ALERT - README
     * To use the library, you need to first specify a license key using the API "initLicense()" as shown below.
     * You can visit https://www.dynamsoft.com/customer/license/trialLicense?utm_source=samples&product=dbr&package=js
     * to get your own trial license good for 30 days.
     * LICENSE ALERT - THE END
     */
    Dynamsoft.License.LicenseManager.initLicense("DLS2eyJoYW5kc2hha2VDb2RlIjoiMjAwMDAwLTEwMzk4OTAwMyIsIm1haW5TZXJ2ZXJVUkwiOiJodHRwczovL21sdHMuZHluYW1zb2Z0LmNvbS8iLCJvcmdhbml6YXRpb25JRCI6IjIwMDAwMCIsInN0YW5kYnlTZXJ2ZXJVUkwiOiJodHRwczovL3NsdHMuZHluYW1zb2Z0LmNvbS8iLCJjaGVja0NvZGUiOjk0NTQ3NzkxMX0=");

    let cameraEnhancer;
    let cvRouter;
    let inSingleFrameMode = false;

    async function toggleSingleFrameMode() {
      if (!cameraEnhancer || !cvRouter) return;
      const btn = document.getElementById("btn-singleframe");
      try {
        await cvRouter.stopCapturing();
        await cameraEnhancer.close();
        if (!inSingleFrameMode) {
          cameraEnhancer.singleFrameMode = "image";
          inSingleFrameMode = true;
          btn.textContent = "Back to Camera";
          btn.classList.add("active");
        } else {
          cameraEnhancer.singleFrameMode = "disabled";
          inSingleFrameMode = false;
          btn.textContent = "Single-Frame Mode";
          btn.classList.remove("active");
        }
        await cameraEnhancer.open();
        await cvRouter.startCapturing("ReadBarcodes_SpeedFirst");
      } catch (ex) {
        console.warn("toggleSingleFrameMode failed:", ex.message || ex);
      }
    }

    async function triggerFocusCenter() {
      if (!cameraEnhancer) return;
      try {
        await cameraEnhancer.setFocus({
          mode: "manual",
          area: {
            centerPoint: { x: "50%", y: "50%" },
            width: "50%",
            height: "50%"
          }
        });
      } catch (ex) {
        console.warn("setFocus failed:", ex.message || ex);
      }
    }

    async function downloadCapabilities() {
      if (!cameraEnhancer) return;
      try {
        const videoTrack = cameraEnhancer.getVideoEl()?.srcObject?.getVideoTracks()?.[0];
        if (!videoTrack) {
          alert("No active video track found.");
          return;
        }
        const capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
        const settings = videoTrack.getSettings ? videoTrack.getSettings() : {};
        const data = {
          label: videoTrack.label,
          capabilities,
          currentSettings: settings,
          userAgent: navigator.userAgent,
          timestamp: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "camera-capabilities.json";
        a.click();
        URL.revokeObjectURL(url);
      } catch (ex) {
        alert("Failed to collect capabilities: " + (ex.message || ex));
      }
    }

    (async () => {
      try {
        const cameraView = await Dynamsoft.DCE.CameraView.createInstance();
        cameraEnhancer = await Dynamsoft.DCE.CameraEnhancer.createInstance(cameraView);
        cvRouter = await Dynamsoft.CVR.CaptureVisionRouter.createInstance();

        cvRouter.setInput(cameraEnhancer);

        const resultReceiver = new Dynamsoft.CVR.CapturedResultReceiver();
        const resultView = document.querySelector(".result-view");
        resultReceiver.onDecodedBarcodesReceived = (result) => {
          resultView.innerHTML = "";
          for (let item of result.barcodeResultItems) {
            const div = document.createElement("div");
            div.innerHTML = `format: ${item.formatString}<br> text: ${item.text} <br> ------------------`;
            resultView.append(div);
          }
        }
        await cvRouter.addResultReceiver(resultReceiver);

        const filter = new Dynamsoft.Utility.MultiFrameResultCrossFilter();
        filter.enableResultCrossVerification("barcode", true);
        filter.enableResultDeduplication("barcode", true);
        await cvRouter.addResultFilter(filter);

        // Restrict scanning to PDF417 only
        const settings = await cvRouter.outputSettings("ReadBarcodes_SpeedFirst", true);
        settings.BarcodeReaderTaskSettingOptions[0].BarcodeFormatIds = ["BF_PDF417"];
        await cvRouter.initSettings(settings);

        document.querySelector(".barcode-scanner-view").append(cameraView.getUIElement());
        await cameraEnhancer.open();
        cameraView.setScanLaserVisible(true);

        // Check if the current camera+browser supports focusDistance
        const statusEl = document.getElementById("focus-status");
        const btnCenter = document.getElementById("btn-center");
        const videoTrack = cameraEnhancer.getVideoEl()?.srcObject?.getVideoTracks()?.[0];
        if (videoTrack?.getCapabilities) {
          const caps = videoTrack.getCapabilities();
          if (caps.focusDistance) {
            statusEl.textContent = "focusDistance supported (" + caps.focusDistance.min + "–" + caps.focusDistance.max + ")";
            statusEl.style.color = "#28a745";
            btnCenter.disabled = false;
          } else {
            statusEl.textContent = "focusDistance not supported by this camera";
            statusEl.style.color = "#dc3545";
          }
        } else {
          statusEl.textContent = "getCapabilities() not available in this browser";
          statusEl.style.color = "#dc3545";
        }

        await cvRouter.startCapturing("ReadBarcodes_SpeedFirst");
      } catch (ex) {
        alert(ex.message || ex);
      }
    })();
  </script>
</body>

</html>
