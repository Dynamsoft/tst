<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamsoft Barcode Scanner Sample - Programmatic Focus</title>
  <!-- Include Dynamsoft Barcode Reader Bundle via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.4.2001/dist/dbr.bundle.js"></script>
  <!-- If the network is unstable or you prefer to self-host the SDK, uncomment the line below to load it locally -->
  <!-- <script src="../../../dist/dbr.bundle.js"></script> -->

  <!--
    Please note that putting CSS at the end is not a best practice.
    We do this so that you can focus on reading the JS logic.
  -->
  <style>
    /* Reset default margin and padding, and apply border-box sizing */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Ensure html and body take full viewport size */
    html,
    body {
      width: 100%;
      height: 100%;
    }

    /* Style for the scanner title */
    .barcode-scanner-title {
      height: 60px;
      line-height: 60px;
      text-align: center;
      font-size: 20px;
    }

    .focus-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 8px;
      flex-wrap: wrap;
    }

    .focus-controls button {
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .focus-controls button.active {
      background: #007bff;
      color: #fff;
      border: 1px solid #007bff;
    }

    /* Container where the barcode scanner will be rendered */
    .barcode-scanner-view {
      width: 100%;
      height: calc(100% - 280px);
    }

    .result-view {
      width: 100%;
      height: 100px;
      padding: 10px;
      overflow: auto;
    }

    .browser-notice {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
      padding: 6px 12px;
      text-align: center;
      font-size: 13px;
      display: none;
    }
  </style>
</head>

<body>
  <h1 class="barcode-scanner-title">Programmatic Focus</h1>
  <!-- Browser compatibility notice for setFocus() -->
  <div class="browser-notice" id="browser-notice">
    Note: setFocus() only works with Chromium-based browsers (Chrome, Edge) on Windows or Android.
    Safari, Firefox, and all iOS browsers are not supported.
  </div>
  <div class="focus-controls">
    <button id="btn-continuous" class="active" onclick="setFocusMode('continuous')">Continuous</button>
    <button id="btn-center" onclick="setFocusMode('center')">Focus Center</button>
    <button id="btn-manual" onclick="setFocusMode('manual')">Manual (distance)</button>
    <label id="distance-label" style="display:none;">
      Distance: <input id="distance-input" type="range" min="0" max="1000" value="200" style="vertical-align:middle;" />
      <span id="distance-value">200</span>
    </label>
  </div>
  <!-- This div will host the barcode scanner's camera view -->
  <div class="barcode-scanner-view"></div>
  <div class="result-view"></div>

  <script>
    /** LICENSE ALERT - README
     * To use the library, you need to first specify a license key using the API "initLicense()" as shown below.
     * You can visit https://www.dynamsoft.com/customer/license/trialLicense?utm_source=samples&product=dbr&package=js
     * to get your own trial license good for 30 days.
     * LICENSE ALERT - THE END
     */
    Dynamsoft.License.LicenseManager.initLicense("DLS2eyJoYW5kc2hha2VDb2RlIjoiMjAwMDAwLTEwMzk4OTAwMyIsIm1haW5TZXJ2ZXJVUkwiOiJodHRwczovL21sdHMuZHluYW1zb2Z0LmNvbS8iLCJvcmdhbml6YXRpb25JRCI6IjIwMDAwMCIsInN0YW5kYnlTZXJ2ZXJVUkwiOiJodHRwczovL3NsdHMuZHluYW1zb2Z0LmNvbS8iLCJjaGVja0NvZGUiOjk0NTQ3NzkxMX0=");

    let cameraEnhancer;

    // Show browser compatibility notice for non-Chromium browsers
    const isChromium = !!window.chrome;
    if (!isChromium) {
      document.getElementById("browser-notice").style.display = "block";
    }

    /**
     * setFocus() uses the browser's MediaStream Image Capture API to control camera focus.
     * It only works with Chromium-based browsers (Chrome, Edge) on Windows or Android.
     * Safari, Firefox, and all iOS browsers (which use WebKit) are not supported.
     */
    async function setFocusMode(mode) {
      if (!cameraEnhancer) return;

      // Update active button state
      document.querySelectorAll(".focus-controls button").forEach(btn => btn.classList.remove("active"));
      document.getElementById("distance-label").style.display = "none";

      try {
        if (mode === "continuous") {
          document.getElementById("btn-continuous").classList.add("active");
          await cameraEnhancer.setFocus({ mode: "continuous" });
        } else if (mode === "center") {
          document.getElementById("btn-center").classList.add("active");
          // Focus on the center 50% area — the SDK adjusts focus distance based on blurriness
          await cameraEnhancer.setFocus({
            mode: "manual",
            area: {
              centerPoint: { x: "50%", y: "50%" },
              width: "50%",
              height: "50%"
            }
          });
        } else if (mode === "manual") {
          document.getElementById("btn-manual").classList.add("active");
          document.getElementById("distance-label").style.display = "inline";
          const distance = parseInt(document.getElementById("distance-input").value);
          await cameraEnhancer.setFocus({ mode: "manual", distance });
        }
      } catch (ex) {
        console.warn("setFocus failed:", ex.message || ex);
      }
    }

    // Update focus when the distance slider changes
    document.getElementById("distance-input").addEventListener("input", async (e) => {
      document.getElementById("distance-value").textContent = e.target.value;
      if (!cameraEnhancer) return;
      try {
        await cameraEnhancer.setFocus({ mode: "manual", distance: parseInt(e.target.value) });
      } catch (ex) {
        console.warn("setFocus failed:", ex.message || ex);
      }
    });

    (async () => {
      try {
        const cameraView = await Dynamsoft.DCE.CameraView.createInstance();
        cameraEnhancer = await Dynamsoft.DCE.CameraEnhancer.createInstance(cameraView);
        const cvRouter = await Dynamsoft.CVR.CaptureVisionRouter.createInstance();

        cvRouter.setInput(cameraEnhancer);

        const resultReceiver = new Dynamsoft.CVR.CapturedResultReceiver();
        const resultView = document.querySelector(".result-view");
        resultReceiver.onDecodedBarcodesReceived = (result) => {
          resultView.innerHTML = "";
          for (let item of result.barcodeResultItems) {
            const div = document.createElement("div");
            div.innerHTML = `format: ${item.formatString}<br> text: ${item.text} <br> ------------------`;
            resultView.append(div);
          }
        }
        await cvRouter.addResultReceiver(resultReceiver);

        const filter = new Dynamsoft.Utility.MultiFrameResultCrossFilter();
        filter.enableResultCrossVerification("barcode", true);
        filter.enableResultDeduplication("barcode", true);
        await cvRouter.addResultFilter(filter);

        // Restrict scanning to PDF417 only
        const settings = await cvRouter.outputSettings("ReadBarcodes_SpeedFirst", true);
        settings.BarcodeReaderTaskSettingOptions[0].BarcodeFormatIds = ["BF_PDF417"];
        await cvRouter.initSettings(settings);

        document.querySelector(".barcode-scanner-view").append(cameraView.getUIElement());
        await cameraEnhancer.open();
        cameraView.setScanLaserVisible(true);
        await cvRouter.startCapturing("ReadBarcodes_SpeedFirst");
      } catch (ex) {
        alert(ex.message || ex);
      }
    })();
  </script>
</body>

</html>
