<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dynamsoft MRZ Scanner - Workflow Testing</title>
		<!-- Eruda: mobile dev-tools console (remove before shipping) -->
		<script src="//cdn.jsdelivr.net/npm/eruda"></script>
		<script>
			eruda.init();
		</script>
		<script src="./dist/mrz-scanner.bundle.js"></script>
		<style>
			/* ===== Reset & Base ===== */
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html, body {
				width: 100%;
				height: 100%;
			}

			body {
				font-family: Arial, sans-serif;
				background: #f5f5f5;
			}

			/* =====================================================
         HOME SECTION — test configuration controls
         ===================================================== */
			#home-section {
				max-width: 1200px;
				margin: 0 auto;
				padding: 20px;
			}

			#home-section h1 {
				font-size: 24px;
				margin-bottom: 10px;
			}

			.controls {
				background: #fff;
				padding: 20px;
				border-radius: 8px;
				margin-bottom: 20px;
				border: 1px solid #ddd;
			}

			.control-group {
				margin-bottom: 15px;
			}

			.control-group > label {
				display: block;
				font-weight: bold;
				margin-bottom: 5px;
			}

			.checkbox-group {
				display: flex;
				gap: 20px;
				flex-wrap: wrap;
			}

			.checkbox-group label {
				font-weight: normal;
				display: flex;
				align-items: center;
				gap: 5px;
			}

			#home-section button {
				background: #007bff;
				color: white;
				border: none;
				padding: 12px 24px;
				font-size: 16px;
				border-radius: 4px;
				cursor: pointer;
				margin-top: 10px;
				margin-right: 10px;
			}

			#home-section button:hover {
				background: #0056b3;
			}
			#home-section button:disabled {
				background: #ccc;
				cursor: not-allowed;
			}

			#uploadFile {
				background: #28a745 !important;
			}
			#uploadFile:hover {
				background: #1e7e34 !important;
			}

			.error-message {
				background: #ffe7e7;
				color: #c00;
				padding: 15px;
				border-radius: 4px;
				border-left: 4px solid #c00;
				margin-top: 10px;
			}

			/* =====================================================
         RESULT SECTION — dark-themed result view
         Matches the Figma design specification.
         ===================================================== */
			/* Hidden by default; shown by adding .is-visible via JS */
			#result-section {
				display: none;
			}

			#result-section.is-visible {
				display: block;
				background: #000;
				min-height: 100vh;
				color: #fff;
				/* Constrain to mobile-style width; remove max-width for full-width layouts */
				max-width: 480px;
				margin: 0 auto;
				padding-bottom: 40px;
			}

			/* ----- Header ----- */
			.result-header {
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 20px 16px 12px;
				position: relative;
			}

			.result-header h2 {
				font-size: 18px;
				font-weight: 600;
				color: #fff;
			}

			/* Circular info button + dropdown wrapper */
			.info-menu {
				position: absolute;
				right: 16px;
			}

			.info-btn {
				width: 28px;
				height: 28px;
				border-radius: 50%;
				border: 2px solid #fff;
				background: transparent;
				color: #fff;
				font-size: 14px;
				font-style: italic;
				font-weight: bold;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 0;
			}

			/* Dropdown panel */
			.info-dropdown {
				display: none;
				position: absolute;
				top: calc(100% + 8px);
				right: 0;
				background: #1a1a1a;
				border-radius: 8px;
				overflow: hidden;
				min-width: 180px;
				box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
				z-index: 100;
			}

			.info-menu.open .info-dropdown {
				display: block;
			}

			.info-dropdown a {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 14px 16px;
				color: #fff;
				text-decoration: none;
				font-size: 14px;
				gap: 12px;
			}

			.info-dropdown a:hover {
				background: #2a2a2a;
			}

			.info-dropdown a svg {
				flex-shrink: 0;
				opacity: 0.6;
			}

			/* ----- Summary card — name, age, expiry + portrait ----- */
			.summary-card {
				display: flex;
				justify-content: space-between;
				align-items: flex-start;
				padding: 8px 20px 24px;
				gap: 12px;
			}

			.summary-info .person-name {
				font-size: 28px;
				font-weight: 700;
				color: #fff;
				margin-bottom: 6px;
			}

			.summary-info .person-details {
				font-size: 14px;
				color: #aaa;
				margin-bottom: 4px;
			}

			/* Portrait image or placeholder */
			.portrait-box {
				width: 80px;
				height: 80px;
				background: #444;
				border-radius: 8px;
				flex-shrink: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}

			.portrait-box svg {
				width: 44px;
				height: 44px;
				opacity: 0.6;
			}

			/* When portrait canvas is present, fill the box */
			.portrait-box canvas {
				width: 100% !important;
				height: 100% !important;
				object-fit: cover;
			}

			/* ----- Image tabs — Processed / Original ----- */
			.tabs-section {
				padding: 0 20px 20px;
			}

			.tab-header {
				display: flex;
				border-bottom: 1px solid #333;
				margin-bottom: 16px;
			}

			.tab-btn {
				background: none;
				border: none;
				color: #666;
				font-size: 15px;
				padding: 10px 20px 10px 0;
				cursor: pointer;
				position: relative;
				font-weight: 500;
			}

			/* Active tab: white text with white underline indicator */
			.tab-btn.active {
				color: #fff;
				font-weight: 600;
			}

			.tab-btn.active::after {
				content: "";
				position: absolute;
				bottom: -1px;
				left: 0;
				right: 0;
				height: 2px;
				background: #fff;
			}

			/* Tab content panels */
			.tab-content {
				display: none;
			}

			.tab-content.active {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 10px;
			}

			/* Each image card */
			.tab-image-card {
				background: #222;
				border-radius: 8px;
				overflow: hidden;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 90px;
			}

			.tab-image-card canvas {
				max-width: 100%;
				height: auto;
				display: block;
			}

			/* Message when no images are available for a tab */
			.tab-empty-msg {
				grid-column: span 2;
				padding: 20px;
				color: #555;
				text-align: center;
				font-size: 13px;
			}

			/* ----- Data sections — Personal Info / Document Info ----- */
			.data-section {
				padding: 20px 20px 0;
			}

			.data-section-title {
				font-size: 16px;
				font-weight: 700;
				color: #fff;
				margin-bottom: 14px;
			}

			/* Each label/value pair */
			.data-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 10px 0;
			}

			.data-row-label {
				font-size: 14px;
				color: #888;
			}

			.data-row-value {
				font-size: 14px;
				color: #fff;
				font-weight: 500;
				text-align: right;
				max-width: 60%;
				word-break: break-word;
			}

			/* ----- Raw MRZ text block ----- */
			.mrz-text-section {
				padding: 20px;
			}

			.mrz-raw-text {
				font-family: "Courier New", monospace;
				font-size: 13px;
				color: #ccc;
				word-break: break-all;
				line-height: 1.6;
			}

			/* ----- Action buttons at the bottom ----- */
			.action-buttons {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 12px;
				padding: 24px 20px 0;
			}

			/* Re-scan: dark button */
			.btn-rescan {
				background: #333;
				color: #fff;
				border: none;
				padding: 16px;
				border-radius: 8px;
				font-size: 15px;
				font-weight: 500;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
			}

			.btn-rescan:hover {
				background: #444;
			}

			/* Return home: white button */
			.btn-home {
				background: #fff;
				color: #000;
				border: none;
				padding: 16px;
				border-radius: 8px;
				font-size: 15px;
				font-weight: 500;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
			}

			.btn-home:hover {
				background: #ddd;
			}

			/* =====================================================
         DESKTOP LAYOUT (≥ 768px)
         On wider screens the result view switches to a
         two-column layout:
           Left  — summary card + image tabs
           Right — personal info, document info, raw MRZ text
         Header and action buttons always span the full width.
         ===================================================== */
			@media (min-width: 768px) {
				#result-section.is-visible {
					max-width: none;
					/* CSS Grid with two named content columns */
					display: grid;
					grid-template-columns: 1fr 1fr;
					grid-template-areas:
						"header  header"
						"left    right"
						"buttons buttons";
					align-items: start;
				}

				.result-header {
					grid-area: header;
				}
				.result-left {
					grid-area: left;
				}
				.result-right {
					grid-area: right;
					border-left: 1px solid #1a1a1a;
				}
				.action-buttons {
					grid-area: buttons;
				}

				/* Give the summary card more breathing room */
				.summary-card {
					padding: 16px 32px 32px;
					align-items: center;
				}

				/* Scale up the name and portrait on larger screens */
				.summary-info .person-name {
					font-size: 36px;
				}
				.summary-info .person-details {
					font-size: 15px;
				}

				.portrait-box {
					width: 120px;
					height: 120px;
				}

				.portrait-box svg {
					width: 60px;
					height: 60px;
				}

				/* Wider padding for the image tabs panel */
				.tabs-section {
					padding: 0 32px 32px;
				}

				/* Center the tab buttons within the left panel */
				.tab-header {
					justify-content: center;
				}
				.tab-btn {
					padding: 10px 20px;
				}

				/* Wider padding for the data and MRZ text panels */
				.data-section {
					padding: 24px 32px 0;
				}
				.mrz-text-section {
					padding: 24px 32px;
				}

				/* Widen the action buttons row */
				.action-buttons {
					padding: 24px 32px 40px;
				}
			}
		</style>
	</head>

	<body>
		<!-- =====================================================
         HOME SECTION
         Test configuration controls (not part of the result
         view — this section is specific to this demo page).
         ===================================================== -->
		<div id="home-section">
			<h1>MRZ Scanner - Workflow Testing</h1>

			<div class="controls">
				<div class="control-group">
					<label>Select Configuration Parameters:</label>
					<div class="checkbox-group">
						<label>
							<input
								type="checkbox"
								id="returnOriginalImage"
								checked
							/>
							returnOriginalImage
						</label>
						<label>
							<input
								type="checkbox"
								id="returnDocumentImage"
								checked
							/>
							returnDocumentImage
						</label>
						<label>
							<input
								type="checkbox"
								id="returnPortraitImage"
								checked
							/>
							returnPortraitImage
						</label>
						<label>
							<input type="checkbox" id="showFormatSelector" />
							showFormatSelector
						</label>
					</div>
				</div>

				<button id="startScan" onclick="startScanning()">
					Start Camera Scan
				</button>
				<button id="uploadFile" onclick="startFileUpload()">
					Scan from File
				</button>
				<div id="home-error"></div>
			</div>
		</div>

		<!-- =====================================================
         RESULT SECTION
         Displayed after a successful scan. Built entirely
         from the public MRZResult API — no internal SDK
         properties are accessed here.
         ===================================================== -->
		<div id="result-section">
			<!-- Header -->
			<div class="result-header">
				<h2>Result</h2>
				<!-- Info button — toggles the dropdown menu -->
				<div class="info-menu" id="info-menu">
					<button
						class="info-btn"
						onclick="toggleInfoMenu()"
						aria-label="More info"
					>
						i
					</button>
					<div class="info-dropdown">
						<a
							href="https://www.dynamsoft.com/use-cases/mrz-scanner/"
							target="_blank"
							rel="noopener"
						>
							About
							<svg
								width="14"
								height="14"
								viewBox="0 0 24 24"
								fill="currentColor"
							>
								<path
									d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"
								/>
							</svg>
						</a>
						<a
							href="https://github.com/Dynamsoft/mrz-scanner-javascript"
							target="_blank"
							rel="noopener"
						>
							Github Projects
							<svg
								width="14"
								height="14"
								viewBox="0 0 24 24"
								fill="currentColor"
							>
								<path
									d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"
								/>
							</svg>
						</a>
						<a
							href="https://www.dynamsoft.com/contact/"
							target="_blank"
							rel="noopener"
						>
							Contact Us
							<svg
								width="14"
								height="14"
								viewBox="0 0 24 24"
								fill="currentColor"
							>
								<path
									d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"
								/>
							</svg>
						</a>
					</div>
				</div>
			</div>

			<!-- ===================================================
           LEFT PANEL — summary + image tabs
           (on mobile this is just the natural document flow;
            on desktop it occupies the left grid column)
           =================================================== -->
			<div class="result-left">
				<!-- Summary: prominent name + portrait at a glance -->
				<div class="summary-card">
					<div class="summary-info">
						<div class="person-name" id="res-name"></div>
						<div class="person-details" id="res-gender-age"></div>
						<div class="person-details" id="res-expiry"></div>
					</div>
					<!-- Portrait image or silhouette placeholder -->
					<div class="portrait-box" id="portrait-container">
						<svg
							viewBox="0 0 24 24"
							fill="#aaa"
							xmlns="http://www.w3.org/2000/svg"
						>
							<path
								d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
							/>
						</svg>
					</div>
				</div>

				<!--
          Image tabs
          - "Processed" shows normalized document images (getDocumentImage)
          - "Original"   shows raw captured images     (getOriginalImage)
        -->
				<div class="tabs-section">
					<div class="tab-header">
						<button
							class="tab-btn active"
							onclick="switchTab('processed')"
						>
							Processed
						</button>
						<button class="tab-btn" onclick="switchTab('original')">
							Original
						</button>
					</div>
					<div id="tab-processed" class="tab-content active"></div>
					<div id="tab-original" class="tab-content"></div>
				</div>
			</div>
			<!-- /.result-left -->

			<!-- ===================================================
           RIGHT PANEL — MRZ data fields + raw text
           (on mobile this is just the natural document flow;
            on desktop it occupies the right grid column)
           =================================================== -->
			<div class="result-right">
				<!-- Personal info fields from the MRZ data -->
				<div class="data-section">
					<div class="data-section-title">Personal Info</div>
					<div id="personal-info-rows"></div>
				</div>

				<!-- Document info fields from the MRZ data -->
				<div class="data-section">
					<div class="data-section-title">Document Info</div>
					<div id="document-info-rows"></div>
				</div>

				<!-- Raw MRZ text for verification or debugging -->
				<div class="mrz-text-section">
					<div class="data-section-title">Raw MRZ Text</div>
					<div class="mrz-raw-text" id="mrz-raw-text"></div>
				</div>
			</div>
			<!-- /.result-right -->

			<!-- Navigation: re-launch scanner or return to home screen -->
			<div class="action-buttons">
				<button class="btn-rescan" onclick="rescan()">
					<!-- Re-scan icon -->
					<svg
						width="18"
						height="18"
						viewBox="0 0 24 24"
						fill="currentColor"
					>
						<path
							d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
						/>
					</svg>
					Re-scan
				</button>
				<button class="btn-home" onclick="returnHome()">
					<!-- Home icon -->
					<svg
						width="18"
						height="18"
						viewBox="0 0 24 24"
						fill="currentColor"
					>
						<path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
					</svg>
					Return home
				</button>
			</div>
		</div>

		<script>
			let mrzScanner;

			/**
			 * Stores the configuration used for the last scan so that
			 * Re-scan can repeat it without returning to the home screen.
			 */
			let currentConfig = {
				returnOriginalImage: true,
				returnDocumentImage: true,
				returnPortraitImage: true,
				showFormatSelector: false,
			};

			// ---------------------------------------------------------------------------
			// Initialization — create a default scanner instance on page load
			// ---------------------------------------------------------------------------
			(async () => {
				try {
					mrzScanner = new Dynamsoft.MRZScanner({
						license: "",
						scannerViewConfig: {
							uiPath: "./dist/mrz-scanner.ui.html",
						},
						templateFilePath: "./dist/mrz-scanner.template.json",
						engineResourcePaths: {
							dcvBundle: "./dist/dist/@dynamsoft/dynamsoft-capture-vision-bundle/dist/",
							dcvData: "./dist/dist/@dynamsoft/dynamsoft-capture-vision-data/"
						},
					});
					console.log("MRZ Scanner initialized successfully");
				} catch (error) {
					console.error("Failed to initialize scanner:", error);
					document.getElementById("home-error").innerHTML =
						`<div class="error-message">Failed to initialize scanner: ${error.message}</div>`;
					document.getElementById("startScan").disabled = true;
				}
			})();

			// ---------------------------------------------------------------------------
			// Scenario helpers (for logging / debugging)
			// ---------------------------------------------------------------------------
			function getScenarioNumber(
				returnOriginal,
				returnDoc,
				returnPortrait,
			) {
				if (returnOriginal && returnDoc && returnPortrait) return 1;
				if (returnOriginal && returnDoc && !returnPortrait) return 2;
				if (returnOriginal && !returnDoc && returnPortrait) return 3;
				if (!returnOriginal && returnDoc && returnPortrait) return 4;
				if (returnOriginal && !returnDoc && !returnPortrait) return 5;
				if (!returnOriginal && returnDoc && !returnPortrait) return 6;
				if (!returnOriginal && !returnDoc && returnPortrait) return 7;
				return 8;
			}

			// ---------------------------------------------------------------------------
			// Info menu (dropdown in the result header)
			// ---------------------------------------------------------------------------

			function toggleInfoMenu() {
				document.getElementById("info-menu").classList.toggle("open");
			}

			// Close the dropdown when clicking anywhere outside it
			document.addEventListener("click", function (e) {
				const menu = document.getElementById("info-menu");
				if (menu && !menu.contains(e.target)) {
					menu.classList.remove("open");
				}
			});

			// ---------------------------------------------------------------------------
			// View state helpers
			// ---------------------------------------------------------------------------
			function showHome() {
				document.getElementById("home-section").style.display = "block";
				document
					.getElementById("result-section")
					.classList.remove("is-visible");
			}

			function showResult() {
				document.getElementById("home-section").style.display = "none";
				document
					.getElementById("result-section")
					.classList.add("is-visible");
			}

			// ---------------------------------------------------------------------------
			// Navigation actions wired to the result view buttons
			// ---------------------------------------------------------------------------

			/** Return to the home/configuration screen. */
			function returnHome() {
				showHome();
			}

			/**
			 * Re-launch the scanner immediately using the same configuration
			 * as the previous scan, without returning to the home screen.
			 */
			async function rescan() {
				try {
					if (mrzScanner) mrzScanner.dispose();
					mrzScanner = new Dynamsoft.MRZScanner({
						license:

			// ---------------------------------------------------------------------------
			// Result view rendering
			// All data is read exclusively through the public MRZResult API:
			//   result.data          — parsed MRZData fields
			//   result.getDocumentImage(side)  — normalized document image
			//   result.getOriginalImage(side)  — raw captured image
			//   result.getPortraitImage()      — cropped portrait image
			// ---------------------------------------------------------------------------

			/**
			 * Format an MRZDate object as YYYY-MM-DD string.
			 * Returns "—" if the date is missing or incomplete.
			 *
			 * @param {Object} dateObj - { year, month, day }
			 * @returns {string}
			 */
			function formatDate(dateObj) {
				if (!dateObj || !dateObj.year) return "—";
				const pad = (n) => String(n).padStart(2, "0");
				return `${dateObj.year}-${pad(dateObj.month)}-${pad(dateObj.day)}`;
			}

			/**
			 * Escape HTML special characters so MRZ filler '<' chars and
			 * other data are not interpreted as markup.
			 *
			 * @param {*} str - Value to escape
			 * @returns {string}
			 */
			function escapeHTML(str) {
				return String(str ?? "")
					.replace(/&/g, "&amp;")
					.replace(/</g, "&lt;")
					.replace(/>/g, "&gt;");
			}

			/**
			 * Build the HTML for a single label/value data row.
			 *
			 * @param {string} label - Human-readable field name
			 * @param {string|number} value - Field value (falsy → "—")
			 * @returns {string} HTML string
			 */
			function dataRow(label, value) {
				return `<div class="data-row">
          <span class="data-row-label">${escapeHTML(label)}</span>
          <span class="data-row-value">${escapeHTML(value || "—")}</span>
        </div>`;
			}

			/**
			 * Render a DSImageData object into a card element and append it
			 * to the given container. Does nothing if imageData is null/undefined.
			 *
			 * @param {HTMLElement} container - Parent element to append to
			 * @param {DSImageData|null} imageData - Image from the MRZResult API
			 */
			function appendImageCard(container, imageData) {
				if (!imageData || !imageData.toCanvas) return;
				const card = document.createElement("div");
				card.className = "tab-image-card";
				const canvas = imageData.toCanvas();
				canvas.style.maxWidth = "100%";
				canvas.style.height = "auto";
				canvas.style.display = "block";
				card.appendChild(canvas);
				container.appendChild(card);
			}

			/**
			 * Activate either the "processed" or "original" image tab.
			 *
			 * @param {"processed"|"original"} tab
			 */
			function switchTab(tab) {
				const processedPanel = document.getElementById("tab-processed");
				const originalPanel = document.getElementById("tab-original");
				const [processedBtn, originalBtn] =
					document.querySelectorAll(".tab-btn");

				const isProcessed = tab === "processed";
				processedPanel.classList.toggle("active", isProcessed);
				originalPanel.classList.toggle("active", !isProcessed);
				processedBtn.classList.toggle("active", isProcessed);
				originalBtn.classList.toggle("active", !isProcessed);
			}

			/**
			 * Populate and display the result view.
			 *
			 * Reads all displayed data from the public MRZResult interface:
			 *   - result.data.firstName / lastName / sex / age / etc.
			 *   - result.getPortraitImage()
			 *   - result.getDocumentImage(side)
			 *   - result.getOriginalImage(side)
			 *
			 * @param {MRZResult} result - The value returned by mrzScanner.launch()
			 */
			function displayResults(result) {
				// Guard: handle cancelled scans or scans with no data
				if (!result || !result.data) {
					document.getElementById("home-error").innerHTML =
						`<div class="error-message">No MRZ data detected. Please try again.</div>`;
					return;
				}

				const d = result.data;

				// --- Summary section ---

				// Full name
				const name = [d.firstName, d.lastName]
					.filter(Boolean)
					.join(" ");
				document.getElementById("res-name").textContent = name || "—";

				// Gender and age on one line, e.g. "Male, 32 yo"
				const genderAge = [d.sex, d.age != null ? `${d.age} yo` : ""]
					.filter(Boolean)
					.join(", ");
				document.getElementById("res-gender-age").textContent =
					genderAge;

				// Expiry date (only show if present)
				const expiryStr = formatDate(d.dateOfExpiry);
				document.getElementById("res-expiry").textContent =
					expiryStr !== "—" ? `Expiry: ${expiryStr}` : "";

				// --- Portrait ---
				// Use getPortraitImage() — only available when returnPortraitImage was true
				const portraitContainer =
					document.getElementById("portrait-container");
				const portraitImage = currentConfig.returnPortraitImage
					? result.getPortraitImage()
					: null;

				if (portraitImage && portraitImage.toCanvas) {
					portraitContainer.innerHTML = "";
					portraitContainer.appendChild(portraitImage.toCanvas());
				} else {
					// Silhouette placeholder when no portrait was captured
					portraitContainer.innerHTML = `
            <svg viewBox="0 0 24 24" fill="#aaa" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>`;
				}

				// --- Processed tab: normalized document images from getDocumentImage() ---
				const processedPanel = document.getElementById("tab-processed");
				processedPanel.innerHTML = "";
				if (currentConfig.returnDocumentImage) {
					appendImageCard(
						processedPanel,
						result.getDocumentImage(Dynamsoft.EnumDocumentSide.MRZ),
					);
					appendImageCard(
						processedPanel,
						result.getDocumentImage(
							Dynamsoft.EnumDocumentSide.Opposite,
						),
					);
				}
				if (processedPanel.children.length === 0) {
					processedPanel.innerHTML = `<p class="tab-empty-msg">No document images available</p>`;
				}

				// --- Original tab: raw captured images from getOriginalImage() ---
				const originalPanel = document.getElementById("tab-original");
				originalPanel.innerHTML = "";
				if (currentConfig.returnOriginalImage) {
					appendImageCard(
						originalPanel,
						result.getOriginalImage(Dynamsoft.EnumDocumentSide.MRZ),
					);
					appendImageCard(
						originalPanel,
						result.getOriginalImage(
							Dynamsoft.EnumDocumentSide.Opposite,
						),
					);
				}
				if (originalPanel.children.length === 0) {
					originalPanel.innerHTML = `<p class="tab-empty-msg">No original images available</p>`;
				}

				// --- Personal Info section ---
				document.getElementById("personal-info-rows").innerHTML =
					dataRow("Given Name", d.firstName) +
					dataRow("Surname", d.lastName) +
					dataRow("Date of Birth", formatDate(d.dateOfBirth)) +
					dataRow("Gender", d.sex) +
					dataRow("Nationality", d.nationality);

				// --- Document Info section ---
				document.getElementById("document-info-rows").innerHTML =
					dataRow("Doc. Type", d.documentType) +
					dataRow("Doc. Number", d.documentNumber) +
					dataRow("Issuing State", d.issuingState) +
					dataRow("Expiry Date", formatDate(d.dateOfExpiry));

				// --- Raw MRZ text ---
				// Displayed as plain text so '<' filler chars render correctly
				document.getElementById("mrz-raw-text").textContent =
					d.mrzText || "";

				// Reset to the "Processed" tab and reveal the result view
				switchTab("processed");
				showResult();
			}
		</script>
