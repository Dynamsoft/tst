<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Dynamsoft MRZ Scanner - Hello World</title>
		<!-- <script src="https://cdn.jsdelivr.net/npm/dynamsoft-mrz-scanner@3.1.0/dist/mrz-scanner.bundle.js"></script> -->
		<!-- To use locally: -->
		<script src="./dist/mrz-scanner.bundle.js"></script>
	</head>

	<body>
		<h1 style="font-size: large">Dynamsoft MRZ Scanner</h1>
		<div
			id="results"
			style="
				display: flex;
				flex-direction: column;
				width: 100%;
				height: 100%;
				word-wrap: break-word;
			"
		></div>

		<script>
			const resultContainer = document.querySelector("#results");

			// Initialize the Dynamsoft MRZ Scanner
			const mrzscanner = new Dynamsoft.MRZScanner({
				license: "",
				returnOriginalImage: true,
				returnDocumentImage: true,
				returnPortraitImage: true,
				scannerViewConfig: {
					uiPath: "./dist/mrz-scanner.ui.html",
				},
				templateFilePath: "./dist/mrz-scanner.template.json",
				engineResourcePaths: {
					dcvBundle:
						"./dist/dist/@dynamsoft/dynamsoft-capture-vision-bundle/dist/",
					dcvData:
						"./dist/dist/@dynamsoft/dynamsoft-capture-vision-data/",
				},
			});

			(async () => {
				// Launch the scanner and wait for the result
				const result = await mrzscanner.launch();
				console.log(result);

				if (result?.data) {
					resultContainer.innerHTML = ""; // Clear placeholder content

					// Display Original Image (smaller)
					const originalImage = result.getOriginalImage(Dynamsoft.EnumDocumentSide.MRZ);
					if (originalImage?.toCanvas) {
						const heading = document.createElement("h3");
						heading.textContent = "Original Image";
						resultContainer.appendChild(heading);

						const canvas = originalImage.toCanvas();
						canvas.style.maxWidth = "60%";
						canvas.style.height = "auto";
						canvas.style.display = "block";
						resultContainer.appendChild(canvas);
					}

					// Display Document Image
					const documentImage = result.getDocumentImage(Dynamsoft.EnumDocumentSide.MRZ);
					if (documentImage?.toCanvas) {
						const heading = document.createElement("h3");
						heading.textContent = "Document Image";
						resultContainer.appendChild(heading);

						const canvas = documentImage.toCanvas();
						canvas.style.maxWidth = "50%";
						canvas.style.height = "auto";
						canvas.style.display = "block";
						resultContainer.appendChild(canvas);
					}

					// Display Portrait Image
					const portraitImage = result.getPortraitImage();
					if (portraitImage?.toCanvas) {
						const heading = document.createElement("h3");
						heading.textContent = "Portrait Image";
						resultContainer.appendChild(heading);

						const canvas = portraitImage.toCanvas();
						canvas.style.maxWidth = "20%";
						canvas.style.height = "auto";
						canvas.style.display = "block";
						resultContainer.appendChild(canvas);
					}

					// Display MRZ Data
					const dataHeading = document.createElement("h3");
					dataHeading.textContent = "MRZ Data";
					resultContainer.appendChild(dataHeading);

					let resultHTML = ``;
					Object.entries(result.data).forEach(([key, value]) => {
						const label = Dynamsoft.MRZDataLabel[key];

						const container = document.createElement("div");
						container.className = "mrz-result-container";
						const labelContainer = document.createElement("div");
						const valueContainer = document.createElement("div");

						labelContainer.textContent = label;
						valueContainer.textContent = `${JSON.stringify(value)}`;

						container.appendChild(labelContainer);
						container.appendChild(valueContainer);
						resultContainer.appendChild(container);
					});
				} else {
					resultContainer.innerHTML =
						"<p>No MRZ scanned. Please try again.</p>";
				}
			})();
		</script>
	</body>
	<style>
		.mrz-result-container {
			display: flex;
			flex-direction: column;
			padding-bottom: 1rem;
		}

		.mrz-result-container:first-of-type {
			padding-top: 1rem;
		}
	</style>
</html>
